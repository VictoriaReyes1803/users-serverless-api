name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests with coverage
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: "3306"
          DB_NAME: besta_users
          DB_USER: root
          DB_PASSWORD: root
          AWS_REGION: us-east-1
          SES_SENDER_EMAIL: no-reply@example.com
          SES_NOTIFICATION_EMAIL: besta-test@mailinator.com

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

      - name: Build
        run: npm run build

  package:
    name: Package Lambda
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies (production only)
        run: npm ci --omit=dev

      - name: Build TypeScript
        run: npm run build

      - name: Create Lambda package
        run: |
          cd dist
          zip -r ../function.zip .
          cd ..
          ls -lh function.zip

      - name: Upload Lambda package artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: function.zip
          retention-days: 5
