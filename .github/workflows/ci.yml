name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests with coverage
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: "3306"
          DB_NAME: besta_users
          DB_USER: root
          DB_PASSWORD: root
          AWS_REGION: us-east-1
          SES_SENDER_EMAIL: no-reply@example.com
          SES_NOTIFICATION_EMAIL: besta-test@mailinator.com

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

      - name: Build
        run: npm run build

  package:
    name: Package Lambda
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package Lambda artifact
        run: npm run package

      - name: Upload Lambda package artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: function.zip
          retention-days: 5

  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: package
    # Only runs when DEPLOY_TO_AWS variable is set to 'true' in the repository.
    # To enable: Settings → Variables → Actions → New variable → DEPLOY_TO_AWS = true
    # Also requires secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, SES_SENDER_EMAIL
    if: vars.DEPLOY_TO_AWS == 'true'
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Lambda package
        uses: actions/download-artifact@v4
        with:
          name: lambda-package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Verify Terraform remote state
        run: |
          if ! grep -R 'backend "s3"' infra/*.tf; then
            echo "::error::Configure a Terraform remote backend before enabling GitHub Actions deploy. Without remote state, Actions cannot see your local terraform.tfstate and may try to recreate infrastructure."
            exit 1
          fi

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Terraform apply
        working-directory: infra
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          TF_VAR_ses_sender_email: ${{ secrets.SES_SENDER_EMAIL }}
          TF_VAR_ses_notification_email: ${{ secrets.SES_NOTIFICATION_EMAIL }}
        run: terraform apply -auto-approve -input=false
